<div class="toast-container">
  <div
    *ngFor="let toast of toastService.toasts$ | async; trackBy: trackById"
    class="toast"
    [ngClass]="'toast-' + toast.type"
  >
    <span class="material-icons toast-icon">
      {{
        toast.type === 'success'
          ? 'check_circle'
          : toast.type === 'error'
            ? 'error_outline'
            : 'info'
      }}
    </span>
    <span class="toast-msg">{{ toast.message }}</span>
    <button class="toast-close" (click)="toastService.dismiss(toast.id)">
      <span class="material-icons">close</span>
    </button>
  </div>
</div>
