<div class="auth-wrapper">

  <!-- Left Brand Panel -->
  <div class="auth-brand-panel">
    <div class="brand-content">
      <h1 class="brand-title">FlowSync</h1>
      <p class="brand-tagline">
        Secure account recovery.<br />
        Get back to your workflow instantly.
      </p>
    </div>
  </div>

  <!-- Right Auth Section -->
  <div class="auth-center">
    <div class="auth-card">
      <div class="auth-body">

        <h3 class="auth-title">Forgot Password 🔐</h3>
        <p class="auth-subtitle">
          Enter your registered email to receive a reset link
        </p>

        <!-- Error -->
        <div *ngIf="serverError$ | async as error" class="auth-alert">
          {{ error }}
        </div>

        <form [formGroup]="forgotForm" (ngSubmit)="submit()">
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              class="auth-input"
              formControlName="email"
              placeholder="you@example.com"
            />
            <small
              class="error-text"
              *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid"
            >
              Please enter a valid email
            </small>
          </div>

          <button
            type="submit"
            class="auth-btn"
            [disabled]="forgotForm.invalid || (isLoading$ | async)"
          >
            <span *ngIf="!(isLoading$ | async)">Send Reset Link</span>
            <span *ngIf="isLoading$ | async" class="loader"></span>
          </button>
        </form>

        <div class="auth-footer">
          Remember your password?
          <a routerLink="/login" class="auth-link">Back to login</a>
        </div>

      </div>
    </div>
  </div>

</div>
