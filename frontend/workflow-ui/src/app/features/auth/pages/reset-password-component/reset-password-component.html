<div class="auth-wrapper">

  <!-- Left Brand Panel -->
  <div class="auth-brand-panel">
    <div class="brand-content">
      <h1 class="brand-title">FlowSync</h1>
      <p class="brand-tagline">
        Create a stronger password.<br />
        Keep your workspace secure.
      </p>
    </div>
  </div>

  <!-- Right Auth Section -->
  <div class="auth-center">
    <div class="auth-card">
      <div class="auth-body">

        <h3 class="auth-title">Reset Password 🔐</h3>
        <p class="auth-subtitle">Enter your new password</p>

        <!-- Server Error -->
        <div *ngIf="serverError" class="auth-alert">
          {{ serverError }}
        </div>

        <form [formGroup]="resetForm" (ngSubmit)="submit()">

          <!-- New Password -->
          <div class="form-group">
            <label>New Password</label>

            <div class="password-wrapper">
              <input
                [type]="showPassword ? 'text' : 'password'"
                class="auth-input"
                formControlName="password"
                placeholder="Enter new password"
              />

              <span
                class="toggle-password"
                (click)="showPassword = !showPassword">
                {{ showPassword ? 'Hide' : 'Show' }}
              </span>
            </div>

            <small class="error-text"
              *ngIf="resetForm.get('password')?.touched && resetForm.get('password')?.invalid">
              Password must be at least 6 characters
            </small>
          </div>

          <!-- Confirm Password -->
          <div class="form-group">
            <label>Confirm Password</label>

            <div class="password-wrapper">
              <input
                [type]="showConfirmPassword ? 'text' : 'password'"
                class="auth-input"
                formControlName="confirmPassword"
                placeholder="Confirm password"
              />

              <span
                class="toggle-password"
                (click)="showConfirmPassword = !showConfirmPassword">
                {{ showConfirmPassword ? 'Hide' : 'Show' }}
              </span>
            </div>

            <small class="error-text"
              *ngIf="resetForm.hasError('passwordMismatch') &&
                     resetForm.get('confirmPassword')?.touched">
              Passwords do not match
            </small>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            class="auth-btn"
            [disabled]="resetForm.invalid || loading">

            <span *ngIf="!loading">Reset Password</span>
            <span *ngIf="loading" class="loader"></span>

          </button>

        </form>

      </div>
    </div>
  </div>

</div>
