<div class="auth-wrapper">

  <!-- Left Brand Panel -->
  <div class="auth-brand-panel">
    <div class="brand-content">
      <h1 class="brand-title">FlowSync</h1>
      <p class="brand-tagline">
        Streamline your workflow.<br />
        Collaborate smarter.
      </p>
    </div>
  </div>

  <!-- Right Auth Area -->
  <div class="auth-center">
    <div class="auth-card">
      <div class="auth-body">

        <h3 class="auth-title">Welcome Back 👋</h3>
        <p class="auth-subtitle">Login to continue</p>

        <!-- Error Alert -->
        <div *ngIf="serverError$ | async as serverError" class="auth-alert">
          {{ serverError }}
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="submit()">

          <!-- Email -->
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              class="auth-input"
              formControlName="email"
              placeholder="you@example.com"
            />
            <small class="error-text"
              *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
              Please enter a valid email
            </small>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label>Password</label>

            <div class="password-wrapper">
              <input
                [type]="showPassword ? 'text' : 'password'"
                class="auth-input"
                formControlName="password"
                placeholder="••••••••"
              />

              <span
                class="toggle-password"
                (click)="showPassword = !showPassword">
                {{ showPassword ? 'Hide' : 'Show' }}
              </span>
            </div>

            <small class="error-text"
              *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
              Password is required
            </small>
          </div>

          <!-- Forgot Password -->
          <div class="forgot-wrapper">
            <a routerLink="/forgot-password" class="auth-link">
              Forgot Password?
            </a>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            class="auth-btn"
            [disabled]="loginForm.invalid || (isLoading$ | async)">

            <span *ngIf="!(isLoading$ | async)">Login</span>
            <span *ngIf="isLoading$ | async" class="loader"></span>

          </button>
        </form>

        <div class="auth-footer">
          Don’t have an account?
          <a routerLink="/signup" class="auth-link">Sign up</a>
        </div>

      </div>
    </div>
  </div>
</div>
