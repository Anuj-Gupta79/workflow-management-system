<div class="success-page-wrapper">
  <div class="success-page-center">
    <div class="success-page-card">
      <div class="success-page-body text-center">

        <div class="success-page-icon mb-4">
          <span class="material-icons">check_circle</span>
        </div>

        <h4 class="success-page-title">Reset Link Sent</h4>

        <p class="success-page-subtitle">
          If an account with that email exists, we’ve sent a password reset link.
          Please check your inbox and follow the instructions.
        </p>

        <button class="success-page-btn mt-3" (click)="goToLogin()">
          Back to Login
        </button>

      </div>
    </div>
  </div>
</div>
