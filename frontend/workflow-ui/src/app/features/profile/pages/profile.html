<div class="profile-page">
  <div *ngIf="loading$ | async" class="loading">Loading profile...</div>

  <ng-container *ngIf="profile$ | async as profile">
    <!-- Header -->
    <div class="page-header">
      <h2>My Profile</h2>
      <p>Manage your personal information.</p>
    </div>

    <!-- Toast feedback -->
    <div *ngIf="saveSuccess" class="profile-toast success">✅ Profile updated successfully.</div>
    <div *ngIf="saveError" class="profile-toast error">
      ❌ Failed to save changes. Please try again.
    </div>

    <!-- Profile Card -->
    <div class="profile-card">
      <div class="avatar-circle">
        {{ profile.name.charAt(0).toUpperCase() }}
      </div>

      <div class="profile-info">
        <h3>{{ profile.name }}</h3>
        <span class="email">{{ profile.email }}</span>
      </div>
    </div>

    <!-- Form -->
    <form [formGroup]="profileForm" (ngSubmit)="save()">
      <div class="info-card">
        <h4>Personal Information</h4>

        <div class="form-grid">
          <div class="form-group full-width">
            <label for="name">Full Name</label>
            <input type="text" id="name" formControlName="name" placeholder="Your full name" />
          </div>

          <div class="form-group full-width">
            <label for="email">Email Address</label>
            <input type="email" id="email" formControlName="email" placeholder="your@email.com" />
          </div>
        </div>
      </div>

      <div class="save-section">
        <button type="submit" class="save-btn" [disabled]="saving || profileForm.invalid">
          {{ saving ? 'Saving...' : 'Save Changes' }}
        </button>
      </div>
    </form>
  </ng-container>
</div>
