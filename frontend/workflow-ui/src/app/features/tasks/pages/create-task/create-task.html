<div class="task-create-page">
  <!-- Header -->
  <div class="page-header">
    <div class="header-left">
      <a routerLink="/dashboard/tasks" class="back-link">
        <span class="material-icons">arrow_back_ios</span>
        Back to Tasks
      </a>
      <h2 class="page-title">Create Task</h2>
      <p class="page-subtitle">Add a new task to your workspace</p>
    </div>
  </div>

  <!-- Form Card -->
  <div class="form-wrapper">
    <form [formGroup]="taskForm" (ngSubmit)="submit()" class="task-form">
      <!-- Title -->
      <div class="form-group" [class.has-error]="f['title'].invalid && f['title'].touched">
        <label for="title"> Task Title <span class="required">*</span> </label>
        <input
          id="title"
          type="text"
          formControlName="title"
          placeholder="e.g. Design landing page, Fix login bug..."
        />
        <span class="error-msg" *ngIf="f['title'].touched && f['title'].errors?.['required']">
          Title is required
        </span>
        <span class="error-msg" *ngIf="f['title'].touched && f['title'].errors?.['minlength']">
          Title must be at least 3 characters
        </span>
      </div>

      <!-- Description -->
      <div class="form-group">
        <label for="description">Description</label>
        <textarea
          id="description"
          rows="4"
          formControlName="description"
          placeholder="Describe what needs to be done, acceptance criteria, links..."
        ></textarea>
      </div>

      <!-- Priority -->
      <div class="form-group">
        <label for="priority">
          Priority
          <span class="label-hint">— defaults to Medium</span>
        </label>

        <div class="select-wrapper">
          <select id="priority" formControlName="priority">
            <option value="LOW">🟢 Low</option>
            <option value="MEDIUM">🟡 Medium</option>
            <option value="HIGH">🔴 High</option>
          </select>
          <span class="material-icons select-icon">expand_more</span>
        </div>
      </div>

      <!-- Assign To -->
      <div class="form-group">
        <label for="assignedTo">
          Assign To
          <span class="label-hint">— optional</span>
        </label>

        <div class="select-wrapper">
          <select id="assignedTo" formControlName="assignedTo">
            <option [ngValue]="null">Unassigned</option>
            <option *ngFor="let m of members$ | async" [ngValue]="m.user?.id || m.userId">
              {{ m.user?.name || m.userName || 'Unknown' }}
              ({{ m.role }})
            </option>
          </select>
          <span class="material-icons select-icon">expand_more</span>
        </div>

        <span class="loading-hint" *ngIf="loadingMembers$ | async"> Loading members... </span>
      </div>

      <!-- Divider -->
      <div class="form-divider"></div>

      <!-- Actions -->
      <div class="form-actions">
        <a routerLink="/dashboard/tasks" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-submit" [disabled]="submitting || taskForm.invalid">
          <span class="material-icons" *ngIf="!submitting">add_task</span>
          <span class="material-icons spinning" *ngIf="submitting">refresh</span>
          {{ submitting ? 'Creating...' : 'Create Task' }}
        </button>
      </div>
    </form>
  </div>
</div>
