<nav class="navbar-custom">
  <!-- LEFT -->
  <div class="nav-left">
    <button class="menu-toggle" (click)="onToggle()">
      <span class="material-icons">menu</span>
    </button>

    <div class="brand">
      <div class="logo-badge">FS</div>
      <span class="brand-text">FlowSync</span>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="nav-right">
    <!-- Notifications -->
    <div class="dropdown-wrapper">
      <div class="icon-button" (click)="toggleNotifications()">
        <span class="material-icons">notifications</span>

        <span *ngIf="notifications.length > 0" class="badge">
          {{ notifications.length }}
        </span>
      </div>

      <div class="custom-dropdown notifications" *ngIf="showNotifications">
        <div class="dropdown-header">
          <span>Notifications</span>

          <button *ngIf="notifications.length > 0" (click)="clearNotifications()">Clear</button>
        </div>

        <div class="notification-list" *ngIf="notifications.length > 0; else emptyState">
          <div
            class="notification-item"
            *ngFor="let n of notifications; trackBy: trackByNotificationId"
          >
            <span class="material-icons notif-icon"> notifications </span>

            <span class="notif-text">
              {{ n.message }}
            </span>
          </div>
        </div>

        <ng-template #emptyState>
          <div class="empty">
            <span class="material-icons">notifications_off</span>
            <p>No notifications</p>
          </div>
        </ng-template>
      </div>
    </div>

    <!-- PROFILE -->
    <div class="dropdown-wrapper" *ngIf="profile$ | async as profile">
      <div class="user-info" (click)="toggleProfileMenu()">
        <div class="avatar">
          {{ profile?.name?.charAt(0) || '?' }}
        </div>

        <span class="user-name">
          {{ profile?.name }}
        </span>

        <span class="material-icons arrow"> expand_more </span>
      </div>

      <div class="custom-dropdown profile-menu" *ngIf="showProfileMenu">
        <div class="profile-header">
          <div class="avatar large">
            {{ profile?.name?.charAt(0) || '?' }}
          </div>

          <div class="profile-meta">
            <div class="name">{{ profile?.name }}</div>
          </div>
        </div>

        <div class="dropdown-divider"></div>

        <div class="dropdown-item" (click)="goToProfile()">
          <span class="material-icons">person</span>
          My Profile
        </div>

        <div class="dropdown-item logout" (click)="logout()">
          <span class="material-icons">logout</span>
          Logout
        </div>
      </div>
    </div>
  </div>
</nav>
