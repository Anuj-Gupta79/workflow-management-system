# ==============================
# APP CONFIGURATION
# ==============================
spring.application.name=backend

# ==============================
# DB CONFIGURATION
# ==============================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/workflow_db}
spring.datasource.username=${DATABASE_USERNAME:workflow}
spring.datasource.password=${DATABASE_PASSWORD:workflow}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# JWT CONFIGURATION
# ==============================
jwt.secret=${JWT_SECRET:workflow-management-system-super-secure-secret-key-256bit-changeme}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==============================
# MAIL CONFIG
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:changeme}
spring.mail.password=${MAIL_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true